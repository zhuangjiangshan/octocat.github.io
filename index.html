<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-store" />
    <title>灵感工坊</title>
    <link rel="stylesheet" href="./styles.css?v=20260609-ripple-icons" />
	<link rel="icon" href="./assets/favicon.svg" type="image/svg+xml">
  </head>
  <body>
    <main id="app" class="app" aria-live="polite">
      <div class="toolbar" aria-label="工具">
        <span id="modeBadge" class="mode-badge">本地模式</span>
        <button id="settingsBtn" class="icon-button" type="button" aria-label="API 设置">
          API
        </button>
        <button id="historyBtn" class="icon-button" type="button" aria-label="历史记录">
          历史
        </button>
      </div>

      <section id="canvas" class="canvas" aria-label="无限画布">
        <div id="canvasWorld" class="canvas-world">
          <svg id="linkLayer" class="link-layer" aria-hidden="true"></svg>
        </div>
        <div id="wordLayer" class="word-layer"></div>
        <div id="emptySignal" class="empty-signal" aria-hidden="true">
          <span></span>
        </div>
        <h1 class="home-title">灵感工坊</h1>
        <div id="loadingChip" class="loading-chip" hidden>正在扩散</div>
        <div class="canvas-controls" aria-label="画布控制">
          <button id="zoomOutBtn" type="button" title="缩小" aria-label="缩小">-</button>
          <span id="zoomStatus">100%</span>
          <button id="zoomInBtn" type="button" title="放大" aria-label="放大">+</button>
          <button id="fitViewBtn" type="button" title="归位" aria-label="归位">归位</button>
          <button id="homeViewBtn" type="button" title="回到首页" aria-label="回到首页">
            <img src="./assets/quanping.svg" alt="" aria-hidden="true" />
          </button>
          <button id="newCanvasBtn" type="button" title="新建空白画布" aria-label="新建空白画布">
            <img src="./assets/xinjian.svg" alt="" aria-hidden="true" />
          </button>
        </div>
        <div id="selectionRect" class="selection-rect" hidden></div>
      </section>

      <section id="selectionPanel" class="selection-panel" aria-label="已选择词语" hidden>
        <div class="selection-head">
          <strong>已选择</strong>
          <button id="clearSelectionBtn" type="button">清空</button>
        </div>
        <div id="selectedList" class="selected-list"></div>
        <button id="ideaBtn" class="idea-button" type="button">生成创意方案</button>
        <div id="ideaList" class="idea-list"></div>
      </section>

      <form id="promptForm" class="prompt-composer" autocomplete="off">
        <div class="composer-glass">
          <input
            id="promptInput"
            name="prompt"
            type="text"
            maxlength="42"
            placeholder="输入一个词或短句"
            aria-label="输入词语或短句"
          />
          <button id="submitBtn" type="submit">扩散</button>
        </div>
      </form>
    </main>

    <div id="nodeMenu" class="node-menu" hidden>
      <button id="menuSelectBtn" type="button">选择词语</button>
      <button id="menuDeleteBtn" type="button">删除联想</button>
      <div class="node-menu-divider"></div>
      <div id="menuSelectionSummary" class="node-menu-summary">未选择灵感</div>
      <button id="menuIdeaBtn" type="button">生成创意方案</button>
      <div id="menuIdeaList" class="menu-idea-list"></div>
    </div>

    <aside id="settingsDrawer" class="drawer settings-drawer" aria-label="DeepSeek API 设置" hidden>
      <div class="drawer-head">
        <strong>API 设置</strong>
        <button class="close-drawer" type="button" data-close="settingsDrawer" aria-label="关闭">
          关闭
        </button>
      </div>
      <label class="field">
        <span>DeepSeek API Key</span>
        <input id="apiKeyInput" type="password" placeholder="sk-..." autocomplete="off" />
      </label>
      <label class="field">
        <span>模型</span>
        <input id="modelInput" type="text" value="deepseek-v4-flash" />
      </label>
      <button id="saveSettingsBtn" class="drawer-action" type="button">保存</button>
      <p id="settingsStatus" class="drawer-status" role="status"></p>
    </aside>

    <aside id="historyDrawer" class="drawer history-drawer" aria-label="历史记录" hidden>
      <div class="drawer-head">
        <strong>历史记录</strong>
        <button class="close-drawer" type="button" data-close="historyDrawer" aria-label="关闭">
          关闭
        </button>
      </div>
      <div id="historyList" class="history-list"></div>
      <button id="clearHistoryBtn" class="drawer-action ghost" type="button">清空历史</button>
    </aside>

    <div id="toast" class="toast" role="status" hidden></div>
    <script src="./app.js?v=20260608-2"></script>
  </body>
</html>
